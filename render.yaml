services:
  - type: web
    name: akhilesh-portfolio-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: SENDGRID_API_KEY
        sync: false

  - type: static_site
    name: akhilesh-portfolio-frontend
    staticPublishPath: ./
    buildCommand: echo "Frontend ready"
    envVars:
      - key: VITE_API_URL
        value: https://akhilesh-portfolio-backend.onrender.com
